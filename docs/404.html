<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="4;url=index.html">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | Hazeltine Detailing</title>
  <meta name="robots" content="noindex">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(145deg, #013220 0%, #024e32 45%, #0a3d2e 100%);
      color: #f5f5f7;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .container {
      max-width: 560px;
      text-align: center;
      animation: fadeIn 0.5s ease-in;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .error-code {
      font-size: clamp(4rem, 15vw, 6rem);
      font-weight: 700;
      line-height: 1;
      margin-bottom: 0.5rem;
      color: #c4a35a;
      text-shadow: 0 2px 20px rgba(0,0,0,0.25);
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 0.75rem;
      font-weight: 600;
    }
    p {
      font-size: 1rem;
      margin-bottom: 1.75rem;
      opacity: 0.92;
      line-height: 1.5;
    }
    .btn-home {
      display: inline-block;
      padding: 0.85rem 1.75rem;
      background: #c4a35a;
      color: #1a1a1a;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 600;
      font-size: 1rem;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 4px 14px rgba(0,0,0,0.2);
    }
    .btn-home:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.25);
    }
    .links {
      margin-top: 1.75rem;
      display: flex;
      gap: 1.25rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .links a {
      color: #f5f5f7;
      text-decoration: none;
      opacity: 0.9;
      font-size: 0.95rem;
    }
    .links a:hover { text-decoration: underline; opacity: 1; }
    .redirect-msg {
      margin-top: 2rem;
      font-size: 0.875rem;
      opacity: 0.75;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="error-code">404</div>
    <h1>Page not found</h1>
    <p>That URL isn’t on this site. If you followed an old link, head back to the homepage or open a main section below.</p>
    <a href="index.html" class="btn-home">Hazeltine home</a>
    <div class="links">
      <a href="contact.html">Contact</a>
      <a href="all-cities.html">Service areas</a>
      <a href="events.html">Events</a>
      <a href="index.html#book">Get a quote</a>
    </div>
    <p class="redirect-msg">Redirecting to the homepage in a few seconds…</p>
  </div>
  <script>
    setTimeout(function () { window.location.href = "index.html"; }, 4000);
  </script>
</body>
</html>
