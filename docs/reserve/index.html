<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="0;url=/">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reserve Your Ride - MinnDrive Airport Transportation</title>
  <link rel="canonical" href="https://www.minndrive.com/">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      text-align: center;
    }
    .container {
      max-width: 500px;
      padding: 2rem;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
    }
    p {
      font-size: 1.1rem;
      margin-bottom: 2rem;
    }
    a {
      display: inline-block;
      padding: 1rem 2rem;
      background: white;
      color: #667eea;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      transition: transform 0.2s;
    }
    a:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Redirecting to MinnDrive...</h1>
    <p>Taking you to our homepage where you can book your ride.</p>
    <a href="/">Click here if you're not redirected automatically →</a>
  </div>
  <script>
    // Instant redirect for JavaScript-enabled browsers
    window.location.href = '/';
  </script>
</body>
</html>
